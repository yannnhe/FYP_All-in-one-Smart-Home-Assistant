    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
    on_press:
      - homeassistant.action:
          action: input_select.select_option
          data:
            entity_id: input_select.home_modes
            option: sleep

output:

  - platform: ledc
    pin: 39
    id: rgb_red
    frequency: 1000Hz

  - platform: ledc
    pin: 40
    id: rgb_green
    frequency: 1000Hz

  - platform: ledc
    pin: 41
    id: rgb_blue
    frequency: 1000Hz

  # Buzzer
  - platform: gpio
    pin: 42
    id: buzzer_kitchen_output
    inverted: true

  # Doorlock door
  - platform: ledc
    pin: 47
    id: doorlock_door_pwm
    frequency: 50Hz

  # Balcony window
  - platform: ledc
    pin: 48
    id: balcony_window_pwm
    frequency: 50Hz

text_sensor:
  
  - platform: homeassistant
    id: ha_home_mode
    entity_id: input_select.home_modes
    internal: true
    on_value:
      then:
        - lambda: |-

            auto mode = id(ha_home_mode).state;

            if (mode == "home") {
              auto call = id(home_mode_indicator).turn_on();
              call.set_effect("None");
              call.set_brightness(0.50);
              call.set_rgb(0.0, 1.0, 0.0);  // Green
              call.perform();

            } else if (mode == "away") {
              auto call = id(home_mode_indicator).turn_on();
              call.set_effect("None");
              call.set_brightness(0.50);
              call.set_rgb(0.0, 0.0, 1.0);  // Blue
              call.perform();

            } else if (mode == "sleep") {
              auto call = id(home_mode_indicator).turn_on();
              call.set_effect("None");
              call.set_brightness(0.30);
              call.set_rgb(0.6, 0.0, 0.8);  // Purple
              call.perform();

            } else if (mode == "emergency") {
              auto call = id(home_mode_indicator).turn_on();
              call.set_brightness(1.0);
              call.set_rgb(1.0, 0.0, 0.0);  // Red
              call.set_effect("Emergency Pulse");
              call.perform();

            } else {
              auto call = id(home_mode_indicator).turn_on();
              call.set_effect("None");
              call.set_brightness(0.15);
              call.set_rgb(1.0, 1.0, 1.0);  // White
              call.perform();
            }

servo:

  - id: doorlock_door_servo
    output: doorlock_door_pwm
    auto_detach_time: 1s
    transition_length: 1s

  - id: balcony_window_servo
    output: balcony_window_pwm
    min_level: 2.5%
    idle_level: 7.5%
    max_level: 12.5%
    auto_detach_time: 1s
    transition_length: 1s

switch:

  - platform: output
    name: "Buzzer - Kitchen"
    output: buzzer_kitchen_output
    id: buzzer_kitchen_switch

  - platform: gpio
    name: "Fan Switch - Bedroom"
    pin: 12
    id: fan_bedroom_switch

  - platform: gpio
    name: "Fan Switch - Kitchen"
    pin: 21
    id: fan_kitchen_switch

  - platform: template
    name: "Doorlock Door"
    id: doorlock_door_switch
    lambda: |-
      return id(doorlock_door_open);
    turn_on_action:
      - servo.write:
          id: doorlock_door_servo
          level: -1
      - delay: 1s
      - lambda: |-
          id(doorlock_door_open) = true;
    turn_off_action:
      - servo.write:
          id: doorlock_door_servo
          level: 0.2
      - delay: 1s
      - lambda: |-
          id(doorlock_door_open) = false;

  - platform: template
    name: "Balcony Window"
    id: balcony_window_switch
    lambda: |-
      return id(balcony_window_open);
    turn_on_action:
      - servo.write:
          id: balcony_window_servo
          level: 1
      - delay: 1s
      - lambda: |-
          id(balcony_window_open) = true;
    turn_off_action:
      - servo.write:
          id: balcony_window_servo
          level: 0
      - delay: 1s
      - lambda: |-
          id(balcony_window_open) = false;

time:

  - platform: homeassistant
    id: homeassistant_time

display:

  platform: tm1637
  clk_pin: 18
  dio_pin: 17
  update_interval: 500ms
  lambda: |-

      static int i = 0;
      i++;
      if ((i % 2) == 0)
        it.strftime("%H.%M", id(homeassistant_time).now());
      else
        it.strftime("%H%M", id(homeassistant_time).now());

light:

  - platform: esp32_rmt_led_strip
    id: ws2812_living_room
    rgb_order: GRB
    pin: 11
    num_leds: 43
    chipset: ws2812
    name: "WS2812B Light - Living Room"
  
  - platform: rgb
    name: "Home Mode Indicator"
    id: home_mode_indicator
    red: rgb_red
    green: rgb_green
    blue: rgb_blue
    restore_mode: ALWAYS_ON
    default_transition_length: 0s
    effects:
      - pulse:
          name: "Emergency Pulse"
          transition_length: 500ms
          update_interval: 500ms
    internal: True