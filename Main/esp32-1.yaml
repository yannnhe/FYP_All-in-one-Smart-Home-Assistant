ota:
  - platform: esphome
    password: "748c0873b519f4eaf474d0fb5ed4e64a"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Esp32-1 Fallback Hotspot"
    password: "ErGGWFwzMCYU"

captive_portal:

globals:

  # Store door position
  - id: doorlock_door_open
    type: bool
    restore_value: yes
    initial_value: "false"

  # Store window position
  - id: balcony_window_open
    type: bool
    restore_value: yes
    initial_value: "false"

  # Store last knob brightness
  - id: last_knob_brightness
    type: float
    restore_value: no
    initial_value: '-1.0'

  # Store last knob percentage
  - id: last_knob_percent
    type: float
    restore_value: no
    initial_value: '-1.0'

sensor:

  # Living Room LED Knob
  - platform: adc
    pin: 1
    name: "Knob ADC voltage"
    update_interval: 0.2s
    id: "knob_source"
    accuracy_decimals: 3
    attenuation: 12db
    filters:
      - median:
          window_size: 5
          send_every: 1
          send_first_at: 1

  # Rotation knob index conversion
  - platform: template
    name: "LED Intensity Index - Living Room"
    update_interval: 0.2s
    accuracy_decimals: 0
    unit_of_measurement: "%"
    icon: "mdi:ceiling-light" 
    lambda: |-

      // Reference voltages at extreme conditions
      const float bright = 3.157;
      const float dark = 0.100;

      // Read ADC Voltage (V)
      float v = id(knob_source).state;

      // Conversion to percentages
      float index = (v - dark) / (bright - dark) * 100.0;

      // Limitations
      if (index < 0.0) index = 0.0;
      if (index > 100.0) index = 100.0;
      return index;

    on_value:
      then:
        - lambda: |-
            
            float knob_percent = x;

            // First reading after startup: Only records the current knob position; does not control the light
            if (id(last_knob_percent) < 0.0) {
              id(last_knob_percent) = knob_percent;
              id(last_knob_brightness) = knob_percent / 100.0;
              return;
            }
            
            // Changes of less than 5% are considered noise and are ignored
            float knob_delta = fabs(knob_percent - id(last_knob_percent));
            if (knob_delta < 5.0) return;

            // Record the current knob value
            id(last_knob_percent) = knob_percent;
            float new_brightness = knob_percent / 100.0;

            // Prevent repeated writing of values with similar brightness levels
            if (fabs(new_brightness - id(last_knob_brightness)) < 0.03) return;

            id(last_knob_brightness) = new_brightness;

            if (new_brightness <= 0.01) {
              auto call = id(ws2812_living_room).turn_off();
              call.perform();
            } else {
              auto call = id(ws2812_living_room).turn_on();
              call.set_brightness(new_brightness);
              call.perform();
            }

  # MQ2 Flammable Gas Sensor
  - platform: adc
    pin: 2
    name: "MQ2 ADC voltage"
    update_interval: 5s
    id: "flammable_gas_source"
    accuracy_decimals: 3
    attenuation: 12db
    internal: true

  # MQ2 PPM conversion
  - platform: template
    name: "Flammable Gas - Kitchen"
    update_interval: 5s
    accuracy_decimals: 0
    unit_of_measurement: "ppm"
    icon: "mdi:fire-circle" 
    lambda: |-
      
      // Read ADC Voltage (V)
      float voltage = id(flammable_gas_source).state;

      // Circuit parameters   
      const float Vcc = 5.0; // Supply voltage
      const float RL = 0.5; // Load resistance (500 ohm)
      const float R0 = 6.64; // Sensor resistance (kΩ) in calibrated clean air

      float RS = (Vcc - voltage) / (voltage / RL); // Calculate the sensor resistance RS
      
      float ppm = pow(11.5428 * R0 / RS, 0.6549f); // Calculate PPM (using the exponential relationship)
      if (ppm < 0) ppm = 0;
      return ppm;

  # GUVA-S12SD UV sensor
  - platform: adc
    pin: 4
    name: "GUVA-S12SD ADC voltage"
    update_interval: 5s
    id: "uv_index_source"
    accuracy_decimals: 3
    samples: 10
    sampling_mode: avg
    internal: true

  # UV index conversion
  - platform: template
    name: "UV index - Balcony"
    update_interval: 5s
    accuracy_decimals: 0
    unit_of_measurement: ""
    icon: "mdi:sun-wireless"
    lambda: |-

      // Non-linear relationship
      if (id(uv_index_source).state < 0.05) return 0;
      if (id(uv_index_source).state <= 0.227) return 1;
      if (id(uv_index_source).state <= 0.318) return 2;
      if (id(uv_index_source).state <= 0.408) return 3;
      if (id(uv_index_source).state <= 0.503) return 4;
      if (id(uv_index_source).state <= 0.606) return 5;
      if (id(uv_index_source).state <= 0.696) return 6;
      if (id(uv_index_source).state <= 0.795) return 7;
      if (id(uv_index_source).state <= 0.881) return 8;
      if (id(uv_index_source).state <= 0.976) return 9;
      return 10;

  # MQ135 Air Quality Sensor
  - platform: adc
    pin: 5
    name: "MQ135 ADC voltage"
    update_interval: 5s
    id: "air_quality_source"
    accuracy_decimals: 3
    attenuation: 12db
    internal: true

  # MQ135 PPM conversion
  - platform: template
    name: "Air Quality - Balcony"
    update_interval: 5s
    accuracy_decimals: 0
    unit_of_measurement: "ppm"
    icon: "mdi:air-filter" 
    lambda: |-
      
      // Read ADC Voltage (V)
      float voltage = id(air_quality_source).state;  

      // Circuit parameters   
      const float Vcc = 5.0; // Supply voltage
      const float RL = 0.5; // Load resistance (500 ohm)
      const float R0 = 6.64; // Sensor resistance (kΩ) in calibrated clean air

      float RS = (Vcc - voltage) / (voltage / RL); // Calculate the sensor resistance RS
      
      float ppm = pow(11.5428 * R0 / RS, 0.6549f); // Calculate PPM (using the exponential relationship)
      if (ppm < 0) ppm = 0;
      return ppm;

  # Light intensity sensor
  - platform: adc
    pin: 6
    name: "Light intensity sensor ADC voltage"
    update_interval: 5s
    id: "light_intensity_source"
    accuracy_decimals: 3
    attenuation: 12db
    internal: true

  # Light intensity sensor LUX conversion
  - platform: template
    name: "Light intensity - Balcony"
    update_interval: 5s
    accuracy_decimals: 0
    unit_of_measurement: "lux"
    icon: "mdi:weather-sunny" 
    lambda: |-

      // Read ADC Voltage (V)
      float voltage = id(light_intensity_source).state;
      
      // Circuit parameters
      const float V_ref = 3.3; // Reference voltage
      const float R_fixed = 10000.0;  // Voltage-dividing resistor of 10 kΩ
      
      // Prevent division by zero when the voltage approaches the reference voltage
      if (voltage >= V_ref - 0.01) return 999;
      
      // Calculating the resistance of a photoresistor
      float R_ldr = voltage / (V_ref - voltage) * R_fixed;
      
      // Calculate illuminance using an empirical formula
      float lux = 40000.0 * pow(R_ldr, -0.6021);
      
      // Limitations
      if (lux > 999.0) lux = 999.0;
      if (lux < 0.0) lux = 0.0;
      return lux;
    
  # Rain sensor
  - platform: adc
    pin: 7
    name: "Rain sensor ADC voltage"
    update_interval: 5s
    id: "rain_sensor_source"
    accuracy_decimals: 3
    attenuation: 12db
    internal: true

  # Rain sensor index conversion
  - platform: template
    name: "Rain Index - Balcony"
    update_interval: 5s
    accuracy_decimals: 0
    unit_of_measurement: "%"
    icon: "mdi:weather-rainy" 
    lambda: |-

      // Reference voltages at extreme conditions
      const float dry = 3.157;
      const float wet = 1.500;

      // Read ADC Voltage (V)
      float v = id(rain_sensor_source).state;

      // Conversion to percentages
      float index = (dry - v) / (dry - wet) * 100.0;

      // Limitations
      if (index < 0.0) index = 0.0;
      if (index > 100.0) index = 100.0;
      return index;

  # DHT11 - Living Room
  - platform: dht
    pin: 13
    temperature:
      name: "Temperature - Living Room"
    humidity:
      name: "Humidity - Living Room"
    update_interval: 5s

  # DHT11 - Balcony
  - platform: dht
    pin: 15
    temperature:
      name: "Temperature - Balcony"
    humidity:
      name: "Humidity - Balcony"
    update_interval: 5s

  # DHT11 - Bedroom
  - platform: dht
    pin: 16
    temperature:
      name: "Temperature - Bedroom"
    humidity:
      name: "Humidity - Bedroom"
    update_interval: 5s

  # Kitchen water level sensor
  - platform: adc
    pin: 8
    name: "Kitchen water level sensor ADC voltage"
    update_interval: 5s
    id: "water_level_source"
    accuracy_decimals: 3
    attenuation: 12db
    internal: true

  # Kitchen water level sensor index conversion
  - platform: template
    name: "Water Level - Kitchen"
    update_interval: 5s
    accuracy_decimals: 0
    unit_of_measurement: "%"
    # icon: "" 
    lambda: |-

      // Reference voltages at extreme conditions
      const float high = 3.157;
      const float low = 0.100;

      // Read ADC Voltage (V)
      float v = id(water_level_source).state;

      // Conversion to percentages
      float index = (v - low) / (high - low) * 100.0;

      // Limitations
      if (index < 0.0) index = 0.0;
      if (index > 100.0) index = 100.0;
      return index;

  # Wifi signal strength
  - platform: wifi_signal
    name: "ESP32-1 wifi signal"
    update_interval: 30s

binary_sensor:
  
  - platform: gpio
    pin:
      number: 14
      mode:
        input: true
    name: "LED Button Switch - Living Room"
    internal: true
    on_press:
      - light.toggle: ws2812_living_room

  - platform: gpio
    pin:
      number: 19
      mode:
        input: true
      inverted: true
    name: "Fire Sensor - Kitchen"

  - platform: gpio
    pin:
      number: 35
      mode:
        input: true
        pullup: true
      inverted: true
    name: "At Home Mode - Button Selection"
    internal: true
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
    on_press:
      - homeassistant.action:
          action: input_select.select_option
          data:
            entity_id: input_select.home_modes
            option: home

  - platform: gpio
    pin:
      number: 36
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Away Mode - Button Selection"
    internal: true
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
    on_press:
      - homeassistant.action:
          action: input_select.select_option
          data:
            entity_id: input_select.home_modes
            option: away

  - platform: gpio
    pin:
      number: 37
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Emergency Mode - Button Selection"
    internal: true
    filters:
