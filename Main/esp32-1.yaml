      - delayed_off: 20ms
    on_press:
      - homeassistant.action:
          action: input_select.select_option
          data:
            entity_id: input_select.home_modes
            option: emergency

  - platform: gpio
    pin:
      number: 38
      mode:
        input: true
        pullup: true
