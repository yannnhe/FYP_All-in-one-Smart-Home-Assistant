esphome:
  name: esp32-1
  friendly_name: ESP32-1
  on_boot:
    priority: -100
    then:

      # 1) Enter safe state to prevent high loads
      - light.turn_off: home_mode_indicator
      - light.turn_off: ws2812_living_room
      - switch.turn_off: fan_kitchen_switch
      - switch.turn_off: fan_bedroom_switch
      - switch.turn_off: buzzer_kitchen_switch

      # 2) The mode indicator first displays the “Starting” status: dim white
      - light.turn_on:
        
          id: home_mode_indicator
          red: 100%
          green: 100%
          blue: 100%
          brightness: 10%
          effect: none

      # 3) Wait for hardware stabilization
      - delay: 1000ms

      # 4) Restore door/window positions based on the last saved settings
      - if:
          condition:
            lambda: 'return id(doorlock_door_open);'
          then:
            - servo.write:
                id: doorlock_door_servo
                level: -1
          else:
            - servo.write:
                id: doorlock_door_servo
                level: 0.2

      - if:
          condition:
            lambda: 'return id(balcony_window_open);'
          then:
            - servo.write:
                id: balcony_window_servo
                level: 1
          else:
            - servo.write:
                id: balcony_window_servo
                level: 0

      # 5) Wait for Home Assistant to sync statuses before updating the mode indicator color
      - delay: 5s
      - lambda: |-

          auto mode = id(ha_home_mode).state;

          if (mode == "home") {
            auto call = id(home_mode_indicator).turn_on();
            call.set_effect("None");
            call.set_brightness(0.50);
            call.set_rgb(0.0, 1.0, 0.0);  // Green
            call.perform();

          } else if (mode == "away") {
            auto call = id(home_mode_indicator).turn_on();
            call.set_effect("None");
            call.set_brightness(0.50);
            call.set_rgb(0.0, 0.0, 1.0);  // Blue
            call.perform();

          } else if (mode == "sleep") {
            auto call = id(home_mode_indicator).turn_on();
            call.set_effect("None");
            call.set_brightness(0.30);
            call.set_rgb(0.6, 0.0, 0.8);  // Purple
            call.perform();

          } else if (mode == "emergency") {
            auto call = id(home_mode_indicator).turn_on();
            call.set_brightness(1.0);
            call.set_rgb(1.0, 0.0, 0.0);  // Red
            call.set_effect("Emergency Pulse");
            call.perform();

          } else {
            auto call = id(home_mode_indicator).turn_on();
            call.set_effect("None");
            call.set_brightness(0.15);
            call.set_rgb(1.0, 1.0, 1.0);  // White
            call.perform();
          }

