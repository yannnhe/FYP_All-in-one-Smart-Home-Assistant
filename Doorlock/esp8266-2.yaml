esphome:

  name: esp8266-2
  friendly_name: ESP8266-2

esp8266:

  board: nodemcuv2

# Enable logging
logger:

# Enable Home Assistant API
api:

  encryption:
    key: "7KsKVwQ2Zg8s2JNZCZA120irIS2DLOqnddK2fvH/5NE="

ota:

  - platform: esphome
    password: "b9917cf05cfb782f4128d1cafcaee871"

wifi:

  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Esp8266-2 Fallback Hotspot"
    password: "RTTg9ijEji9s"

captive_portal:

i2c:

  scl: D3
  sda: D4
  scan: True
  frequency: 100kHz

spi:

  clk_pin: D5
  miso_pin: D6
  mosi_pin: D7

globals:
  
  - id: display_message
    type: std::string
    restore_value: no
    initial_value: '""'

font:

  - id: font1
    file: "fonts/arial.ttf"
    size: 12

# RC522 RFID Reader
rc522_spi:

  cs_pin: D8
  update_interval: 1s
  on_tag:
    - lambda: |-

        std::string uid = x.c_str();

        // If the card reader is disabled, ignore all cards
        if (!id(enable_rfid_switch).state) {
          id(display_message) = "RFID Disabled";
          id(oled_display).update();
          id(clear_display_message).execute();
          return;
        }

        id(rfid_read_uid).publish_state(uid);
        id(clear_uid_after_delay).execute();

        std::vector<std::string> allowed_uids = {"E7-18-69-06"};
        bool granted = false;
        for (auto &allowed : allowed_uids) {
          if (uid == allowed) {
            granted = true;
            break;
          }
        }
        if (granted) {
          id(rfid_granted_pulse).execute();
          id(display_message) = "RFID Granted";
          ESP_LOGI("rfid", "Access granted: %s", uid.c_str());
        } else {
          id(rfid_denied_pulse).execute();
          id(display_message) = "RFID Denied";
          id(beep).execute();  
          ESP_LOGI("rfid", "Access denied: %s", uid.c_str());
        }
        id(oled_display).update();
        id(clear_display_message).execute();

time:

  - platform: homeassistant
    id: ha_time

display:

  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    id: oled_display
    lambda: |-

      it.fill(COLOR_OFF);

      // Top left: time
      if (id(ha_time).now().is_valid()) {
        it.strftime(0, 0, id(font1), "%H:%M", id(ha_time).now());
      } else {
        it.print(0, 0, id(font1), "--:--");
      }

      // Center: display message
      it.printf(64, 24, id(font1), TextAlign::TOP_CENTER, "%s", id(display_message).c_str());

      // Bottom right: wifi signal
      if (!isnan(id(wifi_signal_db).state)) {
        it.printf(128, 54, id(font1), TextAlign::BASELINE_RIGHT, "%.0f dBm", id(wifi_signal_db).state);
      } else {
        it.print(128, 54, id(font1), TextAlign::BASELINE_RIGHT, "No WiFi");
      }

binary_sensor:

  - platform: rc522
    uid: E7-18-69-06
    name: "Detection - RFID Key"
    internal: True

  - platform: rc522
    uid: 71-54-9C-5D
    name: "Detection - RFID Card"
    internal: True

  - platform: template
    id: rfid_granted
    name: "Access Granted - RFID"

  - platform: template
    id: rfid_denied
    name: "Access Denied - RFID"

  - platform: gpio
    pin: D2
    name: "Motion Sensor"
    device_class: motion

  - platform: homeassistant
    id: ha_keypad_granted
    entity_id: binary_sensor.esp8266_1_access_granted_keypad
    internal: True
    on_press:
      then:
        - lambda: |-
            id(display_message) = "Keypad Granted";
            id(oled_display).update();
        - script.execute: clear_display_message

  - platform: homeassistant
    id: ha_keypad_denied
    entity_id: binary_sensor.esp8266_1_access_denied_keypad
    internal: True
    on_press:
      then:
        - script.execute: beep
        - lambda: |-
            id(display_message) = "Keypad Denied";
            id(oled_display).update();
        - script.execute: clear_display_message

  - platform: homeassistant
    id: ha_keypad_disabled
    entity_id: binary_sensor.esp8266_1_keypad_disabled_event
    internal: True
    on_press:
      then:
        - lambda: |-
            id(display_message) = "Keypad Disabled";
            id(oled_display).update();
        - script.execute: clear_display_message

sensor:

  - platform: wifi_signal
    id: wifi_signal_db
    name: "ESP8266-2 wifi signal"
    update_interval: 30s

text_sensor:

  - platform: template
    name: "RFID Read UID"
    id: rfid_read_uid
    update_interval: never

output:

  - platform: gpio
    pin: D1
    id: buzzer_output
    inverted: true

switch:

  - platform: template
    name: "Enable RFID Reader"
    id: enable_rfid_switch
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: output
    name: "Buzzer - Doorlock"
    output: buzzer_output
    id: buzzer_switch

script:
  
  - id: beep
    then:
      - switch.turn_on: buzzer_switch
      - delay: 1s
      - switch.turn_off: buzzer_switch

  - id: clear_uid_after_delay
    mode: restart
    then:
      - delay: 5s
      - text_sensor.template.publish:
          id: rfid_read_uid
          state: ""

  - id: rfid_granted_pulse
    mode: restart
    then:
      - binary_sensor.template.publish:
          id: rfid_granted
          state: ON
      - delay: 1s
      - binary_sensor.template.publish:
          id: rfid_granted
          state: OFF

  - id: rfid_denied_pulse
    mode: restart
    then:
      - binary_sensor.template.publish:
          id: rfid_denied
          state: ON
      - delay: 1s
      - binary_sensor.template.publish:
          id: rfid_denied
          state: OFF
  
  - id: clear_display_message
    mode: restart
    then:
      - delay: 1.5s
      - lambda: |-
          id(display_message) = "";
          id(oled_display).update();